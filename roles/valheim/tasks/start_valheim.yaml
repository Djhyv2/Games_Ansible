- name: Run Server
  ansible.builtin.systemd_service:
    name: 'valheim'
    state: started
    enabled: true
  become: true
  become_method: su
  become_exe: sudo su -
- name: Verify Server
  ansible.builtin.shell: 
    cmd: tail /home/{{ ansible_user }}/bin/valheim_server/log.txt -n 500
  register: server_status
  until: server_status.stdout.find('Done generating locations') != -1
  retries: 12
  delay: 30