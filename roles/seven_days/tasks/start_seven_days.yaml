- name: Run Server
  ansible.builtin.systemd_service:
    name: 'seven_days'
    state: started
    enabled: true
  become: true
  become_method: su
  become_exe: sudo su -
- name: Verify Server
  ansible.builtin.shell: 
    cmd: tail /home/{{ ansible_user }}/bin/seven_days_server/output_log.txt -n 500
  register: server_status
  until: server_status.stdout.find('GameServer.LogOn successful') != -1
  retries: 15
  delay: 45