- name: Check if Server Exists
  ansible.builtin.stat:
    path: /etc/systemd/system/seven_days.service
  register: server_exists
- name: Stop Server
  ansible.builtin.systemd_service:
    name: 'seven_days'
    state: stopped
    enabled: false
  become: true
  become_method: su
  become_exe: sudo su -
  when: server_exists.stat.exists == true
